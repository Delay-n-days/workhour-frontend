name: Build Tauri (Windows)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: ./src-tauri/target
          key: v0-rust-build-windows-Windows_NT-x64-${{ hashFiles('src-tauri/**/*') }}
          restore-keys: |
            v0-rust-build-windows-Windows_NT-x64-

      - name: Install Tauri CLI
        run: bun add -g @tauri-apps/cli

      - name: Build Tauri app
        working-directory: ./src-tauri/crates/app
        run: tauri build

      - name: Upload exe to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: workhour-frontend
          path: src-tauri/target/release/workhour-frontend.exe
